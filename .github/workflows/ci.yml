# .github/workflows/ci.yml
# ------------------------------------------------------------------
# Continuous Integration (CI) pipeline.
#
# GitHub runs this automatically on every push and pull request to `main`.
# It installs the dependencies and runs the full test suite, so any change that
# breaks the tests is caught immediately and shown as a red ✗ on the commit/PR.
# A green ✓ badge on the README tells reviewers the project is healthy.
# ------------------------------------------------------------------
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run test suite
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with pytest
        run: pytest -q
